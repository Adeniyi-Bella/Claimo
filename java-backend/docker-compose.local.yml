name: claimo

services:
  postgres:
    image: postgres:17
    container_name: claimo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - claimo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: claimo-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686" # Jaeger UI
      - "4318:4318" # OTLP HTTP receiver
    command: ["--badger.span-store-ttl=5m"]
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  claimo_pgdata:
