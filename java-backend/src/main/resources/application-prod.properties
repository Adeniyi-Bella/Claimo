# ==========================================
# CLERK
# ==========================================
clerk.secret-key=${CLERK_SECRET_KEY}
clerk.invitation-redirect-url=${CLERK_INVITATION_REDIRECT_URL}
clerk.user-created-webhook-secret=${CLERK_USER_CREATED_WEBHOOK_SECRET}
clerk.user-deleted-webhook-secret=${CLERK_USER_DELETED_WEBHOOK_SECRET}
clerk.invitation-created-webhook-secret=${CLERK_INVITATION_CREATED_WEBHOOK_SECRET}
clerk.invitation-accepted-webhook-secret=${CLERK_INVITATION_ACCEPTED_WEBHOOK_SECRET}
clerk.invitation-revoked-webhook-secret=${CLERK_INVITATION_REVOKED_WEBHOOK_SECRET}

# ==========================================
# DATABASE
# ==========================================
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway — never clean the database in production
# clean-disabled=true is a hard safety lock — prevents dropping all tables
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true
spring.flyway.clean-before-migrate=false

# JPA — validate schema only, never modify it
# ddl-auto=validate ensures Hibernate checks schema matches entities but never alters it
spring.jpa.hibernate.ddl-auto=validate

# HikariCP — increased pool size for production traffic
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.servlet.multipart.max-file-size=3MB

# ==========================================
# RATE LIMITING
# ==========================================
app.ratelimit.requests-per-minute=60

# ==========================================
# SECURITY
# ==========================================
app.security.issuer-uri=${CLERK_ISSUER_URI}
app.security.allowed-origins=${ALLOWED_ORIGINS}

# ==========================================
# AZURE BLOB STORAGE
# ==========================================
spring.cloud.azure.storage.blob.connection-string=${AZURE_STORAGE_CONNECTION_STRING}
spring.cloud.azure.storage.blob.container-name=${AZURE_STORAGE_CONTAINER_NAME}

# ==========================================
# SWAGGER — disabled in production
# API docs should never be publicly accessible in prod
# ==========================================
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ==========================================
# ACTUATOR
# Expose only health and info — never expose env, heapdump, beans
# env endpoint can leak secrets, heapdump can expose credentials in plaintext
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.show-components=when_authorized

# ==========================================
# LOGGING
# No DEBUG in production — INFO for app, WARN for noisy frameworks
# DataSourceProxy debug logs expose every SQL query — turn off in prod
# ==========================================
debug=false
logging.level.root=INFO
logging.level.com.claimo.api=INFO
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.tomcat=WARN
logging.level.org.apache.coyote=WARN
logging.level.org.springframework.web.servlet=WARN
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=OFF

# DataSourceProxy — WARN in prod, keeps slow query alerts but silences debug SQL logs
logging.level.com.claimo.api.config.DataSourceProxyConfig=WARN

# ==========================================
# DEVTOOLS — must be disabled in production
# Devtools auto-restart and livereload have no place in a prod environment
# ==========================================
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false