<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body { margin: 0; }
    #container { width: 100vw; height: 100vh; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/": "https://unpkg.com/three@0.160.0/"
    }
  }
  </script>
</head>
<body>
  <div id="container"></div>
  <script type="module">
    console.log("Script started");
    import * as THREE from "three";
    console.log("THREE loaded", THREE);
    import * as FRAGS from "https://unpkg.com/@thatopen/fragments@3.4.5/dist/index.mjs";
    console.log("FRAGS loaded", FRAGS);
    import * as OBC from "https://unpkg.com/@thatopen/components@2.4.0/dist/index.mjs";
    console.log("OBC loaded", OBC);

    const components = new OBC.Components();
    const worlds = components.get(OBC.Worlds);
    const world = worlds.create();

    world.scene = new OBC.SimpleScene(components);
    world.scene.setup();
    world.renderer = new OBC.SimpleRenderer(components, document.getElementById("container"));
    world.camera = new OBC.SimpleCamera(components);
    world.camera.controls.setLookAt(12, 6, 12, 0, 0, 0);
    components.init();

    const grids = components.get(OBC.Grids);
    grids.create(world);

    const workerUrl = await FRAGS.FragmentsModels.getWorker();
    console.log("Worker URL:", workerUrl);
    const fragments = new FRAGS.FragmentsModels(workerUrl);
    world.camera.controls.addEventListener("update", () => fragments.update());

    const importer = new FRAGS.IfcImporter();
    importer.wasm = { absolute: true, path: "https://unpkg.com/web-ifc@0.0.77/" };

    console.log("Fetching IFC...");
    const res = await fetch("https://thatopen.github.io/engine_fragment/resources/ifc/school_str.ifc");
    const buffer = new Uint8Array(await res.arrayBuffer());
    console.log("Converting IFC...");
    const fragBytes = await importer.process({ bytes: buffer });
    console.log("Loading model...");
    const model = await fragments.load(fragBytes, { modelId: "test" });
    model.useCamera(world.camera.three);
    world.scene.three.add(model.object);
    await fragments.update(true);
    console.log("Model loaded!");
  </script>
</body>
</html>
